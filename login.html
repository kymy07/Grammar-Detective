<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grammar Detective — Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--tan); display: flex; flex-direction: column; min-height: 100vh; }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-box {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }

    .auth-logo {
      font-family: 'Baloo 2', cursive;
      font-size: 1.7rem;
      font-weight: 900;
      color: var(--brown);
      text-align: center;
      margin-bottom: 6px;
    }
    .auth-logo .t { color: var(--teal); }

    .auth-sub {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-weight: 800;
      font-size: 0.88rem;
      color: var(--brown);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--tan-dark);
      border-radius: var(--radius-sm);
      font-family: 'Nunito', sans-serif;
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--dark);
      background: var(--offwhite);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(91,184,176,0.18);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Baloo 2', cursive;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      margin-top: 8px;
      margin-bottom: 16px;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-submit:hover {
      background: var(--teal-dk);
      transform: translateY(-2px);
    }

    .alert {
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 14px;
      display: none;
    }
    .alert-error   { background: #ffe8e8; color: var(--red);   border: 1.5px solid #f8c0c0; }
    .alert-success { background: #e8f8ec; color: var(--green); border: 1.5px solid #b6e8be; }

    .auth-switch {
      text-align: center;
      font-size: 0.88rem;
      font-weight: 700;
      color: #999;
    }
    .auth-switch a { color: var(--teal); font-weight: 800; }
    .auth-switch a:hover { text-decoration: underline; }

    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 46px; }
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--teal); }
    .eye-btn svg { width: 20px; height: 20px; pointer-events: none; }
  </style>
</head>
<body>

<nav class="gd-nav" id="gd-nav"></nav>

<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo">Grammar <span class="t">Detective</span> 🔍</div>
    <p class="auth-sub">Welcome back, Detective! 👋</p>

    <div class="alert alert-error"   id="err-msg"></div>
    <div class="alert alert-success" id="ok-msg"></div>

    <div class="form-group">
      <label for="inp-user">Username</label>
      <input type="text" id="inp-user" placeholder="Enter your username" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="inp-pass">Password</label>
      <div class="pass-wrap">
        <input type="password" id="inp-pass" placeholder="Enter your password" autocomplete="current-password" />
        <button type="button" class="eye-btn" onclick="togglePass('inp-pass', this)" title="Show/Hide password">
          <svg id="eye-icon-inp-pass" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-submit" onclick="doLogin()">🔓 Login</button>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Sign Up Free!</a>
    </div>
    <div class="auth-switch" style="margin-top:10px;">
      <a href="index.html" style="color:#bbb;">← Back to Home</a>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // If already logged in, redirect to dashboard
  if (GD.getCurrent()) window.location.href = 'dashboard.html';

  function showMsg(id, text) {
    document.getElementById(id).textContent = text;
    document.getElementById(id).style.display = 'block';
  }

  function doLogin() {
    document.getElementById('err-msg').style.display = 'none';
    document.getElementById('ok-msg').style.display = 'none';

    const username = document.getElementById('inp-user').value.trim();
    const password = document.getElementById('inp-pass').value;

    if (!username || !password) {
      showMsg('err-msg', '⚠️ Please enter your username and password!');
      return;
    }

    const users = GD.getUsers();
    if (!users[username] || users[username].pass !== password) {
      showMsg('err-msg', '❌ Wrong username or password. Please try again.');
      return;
    }

    const user = { username, name: users[username].name, grade: users[username].grade };
    GD.saveCurrent(user);
    showMsg('ok-msg', '✅ Login successful! Redirecting...');

    // Redirect to "next" param or dashboard
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || 'dashboard.html';
    setTimeout(() => { window.location.href = next; }, 800);
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function togglePass(id, btn) {
    const inp = document.getElementById(id);
    const svg = btn.querySelector('svg');
    if (inp.type === 'password') {
      inp.type = 'text';
      svg.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      inp.type = 'password';
      svg.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }
</script>
</body>
</html>
