<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grammar Detective — Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="gd-nav" id="gd-nav"></nav>

<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo">Grammar <span class="t">Detective</span> 🔍</div>
    <p class="auth-sub">Create your Detective Badge! 🕵️</p>

    <div class="alert alert-error"   id="err-msg"></div>
    <div class="alert alert-success" id="ok-msg"></div>

    <div class="form-group">
      <label for="inp-name">Full Name</label>
      <input type="text" id="inp-name" placeholder="e.g. Ahmad Faris" autocomplete="name" />
    </div>
    <div class="form-group">
      <label for="inp-user">Username</label>
      <input type="text" id="inp-user" placeholder="Choose a username (no spaces)" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="inp-pass">Password</label>
      <input type="password" id="inp-pass" placeholder="Minimum 6 characters" autocomplete="new-password" />
    </div>
    <div class="form-group">
      <label for="inp-grade">Year / Grade</label>
      <select id="inp-grade">
        <option value="">-- Select your year --</option>
        <option>Year 4</option>
        <option>Year 5</option>
        <option>Year 6</option>
        <option>Other</option>
      </select>
    </div>

    <button class="btn-submit" onclick="doSignup()">🚀 Create Account</button>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Login here</a>
    </div>
    <div class="auth-switch" style="margin-top:10px;">
      <a href="index.html" style="color:#bbb;">← Back to Home</a>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  if (GD.getCurrent()) window.location.href = 'dashboard.html';

  function showMsg(id, text) {
    document.getElementById(id).textContent = text;
    document.getElementById(id).style.display = 'block';
  }

  function doSignup() {
    document.getElementById('err-msg').style.display = 'none';
    document.getElementById('ok-msg').style.display = 'none';

    const name     = document.getElementById('inp-name').value.trim();
    const username = document.getElementById('inp-user').value.trim();
    const password = document.getElementById('inp-pass').value;
    const grade    = document.getElementById('inp-grade').value;

    if (!name || !username || !password || !grade) {
      showMsg('err-msg', '⚠️ Please fill in all fields!'); return;
    }
    if (/\s/.test(username)) {
      showMsg('err-msg', '⚠️ Username cannot contain spaces!'); return;
    }
    if (password.length < 6) {
      showMsg('err-msg', '⚠️ Password must be at least 6 characters!'); return;
    }

    const users = GD.getUsers();
    if (users[username]) {
      showMsg('err-msg', '⚠️ Username already taken. Try another one.'); return;
    }

    users[username] = { name, pass: password, grade };
    GD.saveUsers(users);

    showMsg('ok-msg', '🎉 Account created! Redirecting to login...');
    setTimeout(() => { window.location.href = 'login.html'; }, 1400);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
</script>
</body>
</html>
